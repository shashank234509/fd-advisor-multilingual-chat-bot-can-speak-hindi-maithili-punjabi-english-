<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Voice FD Advisor - 3D Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif; 
            background: #000; color: #fff; 
        }
        #canvas-container { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 1; 
        }
        #ui-layer { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 2; 
            pointer-events: none; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; 
            padding: 40px; box-sizing: border-box; 
        }
        
        /* Avatar Styles */
        #avatar-container { 
            position: relative; width: 250px; height: 250px; 
            display: flex; justify-content: center; align-items: center; 
            margin-top: 10vh; 
        }
        .avatar-glow { 
            position: absolute; border-radius: 50%; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(0, 150, 255, 0.4) 0%, rgba(0, 50, 255, 0) 70%); 
            transition: transform 0.05s linear; 
        }
        .avatar-core { 
            position: absolute; border-radius: 50%; width: 120px; height: 120px; 
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); 
            box-shadow: 0 0 30px #00f2fe; 
            transition: transform 0.05s linear, border-radius 0.05s linear; 
            display: flex; justify-content: center; align-items: center;
        }
        /* A little simple face / eyes */
        .eyes {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .eye {
            width: 15px; height: 15px; 
            background: #fff; border-radius: 50%;
        }
        
        /* Dialog Box */
        #text-box { 
            background: rgba(10, 10, 25, 0.6); backdrop-filter: blur(15px); 
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15); 
            max-width: 600px; width: 100%; text-align: center; 
            pointer-events: auto; transform: translateY(-50px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #text-display { 
            font-size: 20px; line-height: 1.5; min-height: 60px; 
            margin-bottom: 25px; transition: opacity 0.3s; 
        }
        #controls { 
            display: flex; justify-content: center; gap: 15px; 
        }
        
        button { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255,255,255,0.4); color: #fff; 
            padding: 14px 30px; border-radius: 30px; 
            font-size: 16px; font-weight: 600; cursor: pointer; 
            backdrop-filter: blur(5px); transition: all 0.2s; 
        }
        button:hover { 
            background: rgba(255, 255, 255, 0.2); transform: scale(1.05); 
        }
        button:active { 
            transform: scale(0.95); 
        }
        button.recording { 
            background: rgba(255, 50, 50, 0.5); 
            border-color: rgba(255, 100, 100, 0.9); 
            animation: pulse-red 1.5s infinite; 
        }
        
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(255, 50, 50, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(255, 50, 50, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 50, 50, 0); } 
        }
        
        #status { 
            font-size: 12px; opacity: 0.5; margin-top: 15px; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
        }
    </style>
    <!-- Three.js for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        
        <div id="avatar-container">
            <div class="avatar-glow" id="avatar-glow"></div>
            <div class="avatar-core" id="avatar-core">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
            </div>
        </div>
        
        <div id="text-box">
            <div id="text-display">Initiating AI Advisor... Click 'Start'</div>
            <div id="controls">
                <button id="main-btn" onclick="startApp()">Start</button>
            </div>
            <div id="status">WAITING</div>
        </div>
    </div>

    <script>
        // --- 3D Background Setup (Galaxy, Stars, Asteroids, Comets) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.001);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 3000);
        camera.position.z = 600;

        const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 1. Stars (Galaxy)
        const starGeom = new THREE.BufferGeometry();
        const starCount = 8000;
        const starPos = new Float32Array(starCount * 3);
        const starColor = new Float32Array(starCount * 3);

        for(let i=0; i<starCount*3; i+=3) {
            starPos[i] = (Math.random() - 0.5) * 3000;
            starPos[i+1] = (Math.random() - 0.5) * 3000;
            starPos[i+2] = (Math.random() - 0.5) * 3000 - 500;
            
            const colorType = Math.random();
            if(colorType > 0.9) { 
                starColor[i] = 0.5; starColor[i+1] = 0.8; starColor[i+2] = 1.0;
            } else if(colorType > 0.8) { 
                starColor[i] = 1.0; starColor[i+1] = 0.6; starColor[i+2] = 0.6;
            } else { 
                starColor[i] = 1.0; starColor[i+1] = 1.0; starColor[i+2] = 1.0;
            }
        }
        starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeom.setAttribute('color', new THREE.BufferAttribute(starColor, 3));

        const starMat = new THREE.PointsMaterial({
            size: 2, vertexColors: true, transparent: true, opacity: 0.8, sizeAttenuation: true
        });
        const stars = new THREE.Points(starGeom, starMat);
        scene.add(stars);

        // 2. Asteroid Belt
        const asteroids = new THREE.Group();
        const asteroidGeom = new THREE.DodecahedronGeometry(5);
        const asteroidMat = new THREE.MeshStandardMaterial({
            color: 0x666666, roughness: 0.9, metalness: 0.1
        });
        for(let i=0; i<400; i++) {
            const mesh = new THREE.Mesh(asteroidGeom, asteroidMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 300 + Math.random() * 200;
            mesh.position.x = Math.cos(angle) * radius;
            mesh.position.y = (Math.random() - 0.5) * 100;
            mesh.position.z = Math.sin(angle) * radius - 200;
            
            mesh.rotation.x = Math.random() * Math.PI;
            mesh.rotation.y = Math.random() * Math.PI;
            
            const scale = Math.random() * 2 + 0.5;
            mesh.scale.set(scale, scale, scale);
            asteroids.add(mesh);
        }
        scene.add(asteroids);

        // Lights for asteroids
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        const blueLight = new THREE.PointLight(0x00aaff, 2, 1000);
        blueLight.position.set(0, 0, 300);
        scene.add(blueLight);

        // 3. Comets
        const comets = [];
        const cometMat = new THREE.MeshBasicMaterial({color: 0x00ffff});
        function spawnComet() {
            const geom = new THREE.SphereGeometry(2, 8, 8);
            const mesh = new THREE.Mesh(geom, cometMat);
            mesh.position.set(-1000, (Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800 - 300);
            const speed = Math.random() * 8 + 4;
            scene.add(mesh);
            comets.push({mesh, speed});
        }
        setInterval(spawnComet, 3000);

        function animate3D() {
            requestAnimationFrame(animate3D);
            // Scene rotations
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0001;
            asteroids.rotation.y -= 0.0008;
            asteroids.rotation.z -= 0.0002;
            
            for(let i=asteroids.children.length-1; i>=0; i--) {
                asteroids.children[i].rotation.x += 0.005;
                asteroids.children[i].rotation.y += 0.005;
            }
            
            // Move comets
            for(let i=comets.length-1; i>=0; i--) {
                comets[i].mesh.position.x += comets[i].speed;
                comets[i].mesh.position.y += comets[i].speed * 0.2; // slight angle
                if(comets[i].mesh.position.x > 1000) {
                    scene.remove(comets[i].mesh);
                    comets.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }
        animate3D();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Voice Interaction & Lip Sync Setup ---
        const sessionId = Math.random().toString(36).substring(2, 15);
        let audioContext, analyser, dataArray, source;
        
        const glow = document.getElementById('avatar-glow');
        const core = document.getElementById('avatar-core');
        const textDisplay = document.getElementById('text-display');
        const mainBtn = document.getElementById('main-btn');
        const statusEl = document.getElementById('status');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'hi-IN'; // Defaulting to hindi input context
            
            recognition.onstart = () => {
                mainBtn.classList.add('recording');
                mainBtn.textContent = 'Listening...';
                statusEl.textContent = 'RECORDING';
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                textDisplay.textContent = `You: "${transcript}"`;
                sendMessage(transcript);
            };
            
            recognition.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                mainBtn.classList.remove('recording');
                mainBtn.textContent = 'Hold to Speak';
                statusEl.textContent = 'ERROR: ' + event.error.toUpperCase();
                
                if (event.error === 'not-allowed') {
                    textDisplay.textContent = "It looks like your microphone is blocked. Please click the icon in your URL bar to allow microphone access.";
                } else if (event.error === 'no-speech') {
                    textDisplay.textContent = "I didn't hear anything. Please try again.";
                }
            };
            
            recognition.onend = () => {
                mainBtn.classList.remove('recording');
                if(statusEl.textContent === 'RECORDING') {
                    statusEl.textContent = 'PROCESSING...';
                    mainBtn.textContent = 'Processing...';
                }
            };
        } else {
            textDisplay.textContent = "Your browser does not support Web Speech API. Please use Chrome.";
        }

        async function startApp() {
            if(!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                animateAvatarSync();
            }
            if(audioContext.state === 'suspended') {
                audioContext.resume();
            }
            sendMessage("INIT"); // Trigger initial AI query
        }

        function toggleRecording() {
            if (mainBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                try { recognition.start(); } catch(e) {}
            }
        }

        function playAudioBase64(base64str) {
            const binary = atob(base64str);
            const arrayBuffer = new ArrayBuffer(binary.length);
            const view = new Uint8Array(arrayBuffer);
            for(let i=0; i<binary.length; i++) view[i] = binary.charCodeAt(i);
            
            audioContext.decodeAudioData(arrayBuffer, (buffer) => {
                if(source) { source.disconnect(); }
                source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                source.start(0);
                
                source.onended = () => {
                    statusEl.textContent = 'IDLE';
                    mainBtn.textContent = 'Hold to Speak';
                    mainBtn.onclick = toggleRecording;
                };
            }, (e) => {
                console.error("Audio Decode Error", e);
                statusEl.textContent = 'IDLE';
                mainBtn.textContent = 'Hold to Speak';
                mainBtn.onclick = toggleRecording;
            });
        }

        async function sendMessage(text) {
            statusEl.textContent = 'THINKING...';
            // Stop any ongoing audio playing
            if(source) { source.stop(); }
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sessionId, message: text})
                });
                const data = await res.json();
                
                textDisplay.textContent = data.text;
                
                if(data.audio_base64) {
                    statusEl.textContent = 'SPEAKING';
                    mainBtn.textContent = 'AI Speaking...';
                    mainBtn.onclick = null;
                    playAudioBase64(data.audio_base64);
                } else {
                    statusEl.textContent = 'IDLE';
                    mainBtn.textContent = 'Hold to Speak';
                    mainBtn.onclick = toggleRecording;
                }
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'NETWORK ERROR';
                mainBtn.textContent = 'Retry';
                mainBtn.onclick = () => sendMessage(text);
            }
        }

        // Loop to analyze audio frequency and deform avatar for lip-sync
        function animateAvatarSync() {
            requestAnimationFrame(animateAvatarSync);
            if(analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) { sum += dataArray[i]; }
                let avg = sum / dataArray.length; // volume representation
                
                // Scale outer glow based on sound
                let glowScale = 1 + (avg / 256) * 1.5;
                glow.style.transform = `scale(${glowScale})`;
                
                // Modify border radius to simulate mouth movement / morphing
                // High freq shifts it away from 50%
                let morphX = 50 + (avg / 256) * 40; 
                let morphY = 50 - (avg / 256) * 15;
                core.style.borderRadius = `${morphX}% ${morphY}% ${morphX}% ${morphY}%`;
                
                // Pulsate inner core slightly based on sound volume
                let coreScale = 1 + (avg / 256) * 0.3;
                core.style.transform = `scale(${coreScale})`;
            }
        }
    </script>
</body>
</html>
